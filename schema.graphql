type Token {
  id: ID! # Token Address
  name: String!
  symbol: String!
  ipfsCID: String!
  creator: String!
  currentSupply: BigInt!
  reserveUSDC: BigInt!
  tradeCount: Int!
}

type Factory_TokenCreated {
  id: ID!
  tokenAddress: String!
  name: String!
  symbol: String!
  ipfsCID: String!
}

type Factory_Trade {
  id: ID!
  tokenAddress: String!
  user: String!
  tokenAmount: BigInt!
  usdcAmount: BigInt!
  isBuy: Boolean!
  timestamp: BigInt!
}